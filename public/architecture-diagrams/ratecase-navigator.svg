      <text x="320" y="190" text-anchor="middle" font-size="11" fill="#6B5D4F">proceeding folio · commitments</text>
      <text x="320" y="207" text-anchor="middle" font-size="10" fill="#9AA5B1" letter-spacing="0.5">WEB</text>
